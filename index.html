<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thiago Di Giorgio — Practical AI</title>
  <meta name="description" content="Free AI tools, prompts, and resources. Built by Thiago — 20+ years in tech, helping you actually use AI." />
  <meta property="og:title" content="Thiago Di Giorgio — Practical AI" />
  <meta property="og:description" content="Free AI tools, prompts, and resources. No hype." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #00e676;
      --accent: #00bcd4;
      --gradient: linear-gradient(135deg, #ffffff, #00e676, #00bcd4);
      --bg: #0d1117;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.55);
      --radius: 14px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 20px 64px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 230, 118, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header { text-align: center; margin-bottom: 40px; }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: var(--gradient);
      padding: 3px;
      position: relative;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg);
      display: block;
    }

    .avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 36px;
      background-image: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
      max-width: 380px;
      margin: 0 auto;
    }

    .tagline strong { color: var(--text); font-weight: 500; }

    .section { margin-bottom: 28px; }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }

    .link:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 10px;
      background: rgba(0, 230, 118, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .link-text { flex: 1; min-width: 0; }

    .link-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .link-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .link-arrow {
      color: var(--text-muted);
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .link:hover .link-arrow {
      transform: translateX(3px);
      color: var(--primary);
    }

    .link.featured {
      background: linear-gradient(135deg, rgba(0, 230, 118, 0.08), rgba(0, 188, 212, 0.04));
      border-color: rgba(0, 230, 118, 0.2);
    }

    .link.featured .link-icon {
      background: var(--gradient);
      color: var(--bg);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }

    .social {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
    }

    .social:hover {
      background: var(--bg-card-hover);
      border-color: var(--primary);
      color: var(--primary);
    }

    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--text-muted);
      font-size: 12px;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 500;
    }

    .loading, .error {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
      font-size: 14px;
    }

    .error { color: #ff6b6b; }

    @media (max-width: 480px) {
      body { padding: 32px 16px 48px; }
      h1 { font-size: 20px; }
      .tagline { font-size: 14px; }
      .link { padding: 12px 14px; gap: 12px; }
      .link-icon { width: 32px; height: 32px; font-size: 16px; }
      .link-title { font-size: 14px; }
      .link-sub { font-size: 12px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header id="header"></header>
    <main id="links-root">
      <div class="loading">Loading…</div>
    </main>
    <footer>
      <p>Built by <a href="https://www.cyber353.com" target="_blank" rel="noopener">Cyber353</a></p>
    </footer>
  </div>

  <script>
    // All content lives in links.json — this script just renders it.
    // To update the page, edit links.json. Nothing else.

    async function render() {
      const root = document.getElementById('links-root');
      const headerEl = document.getElementById('header');

      try {
        // Cache-bust so edits appear immediately on refresh
        const res = await fetch('links.json?v=' + Date.now());
        if (!res.ok) throw new Error('Could not load links.json (' + res.status + ')');
        const data = await res.json();

        // --- Header ---
        const avatarHTML = data.profile.avatar
          ? `<img src="${data.profile.avatar}" alt="${data.profile.name}" onerror="this.outerHTML='<div class=avatar-fallback>${data.profile.name.charAt(0)}</div>'" />`
          : `<div class="avatar-fallback">${data.profile.name.charAt(0)}</div>`;

        headerEl.innerHTML = `
          <div class="avatar">${avatarHTML}</div>
          <h1>${data.profile.name}</h1>
          <p class="tagline">${data.profile.tagline}</p>
        `;
        document.title = data.profile.name + ' — ' + (data.profile.title || 'Links');

        // --- Sections & links ---
        root.innerHTML = '';
        (data.sections || []).forEach(section => {
          const sectionEl = document.createElement('div');
          sectionEl.className = 'section';
          sectionEl.innerHTML = `<h2 class="section-title">${section.title}</h2>`;

          (section.links || []).forEach(link => {
            const a = document.createElement('a');
            a.className = 'link' + (link.featured ? ' featured' : '');
            a.href = link.url;
            const isExternal = /^https?:\/\//i.test(link.url);
            if (isExternal) {
              a.target = '_blank';
              a.rel = 'noopener';
            }
            a.innerHTML = `
              <div class="link-icon">${link.icon || '→'}</div>
              <div class="link-text">
                <div class="link-title">${link.title}</div>
                ${link.sub ? `<div class="link-sub">${link.sub}</div>` : ''}
              </div>
              <div class="link-arrow">→</div>
            `;
            sectionEl.appendChild(a);
          });

          root.appendChild(sectionEl);
        });

        // --- Socials ---
        if (data.socials && data.socials.length) {
          const socialsEl = document.createElement('div');
          socialsEl.className = 'socials';
          data.socials.forEach(s => {
            socialsEl.innerHTML += `
              <a class="social" href="${s.url}" target="_blank" rel="noopener" aria-label="${s.label}" title="${s.label}">
                ${s.icon}
              </a>
            `;
          });
          root.appendChild(socialsEl);
        }
      } catch (err) {
        root.innerHTML = `<div class="error">Failed to load content. ${err.message}</div>`;
        console.error(err);
      }
    }

    render();
  </script>
</body>
</html>
